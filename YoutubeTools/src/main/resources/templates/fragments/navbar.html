<nav class="bg-white/80 dark:bg-[#111111]/80 backdrop-blur-md
            border-b border-zinc-200 dark:border-white/10
            sticky top-0 z-50 transition-all duration-300"
     th:fragment="navbar"
     xmlns:th="http://www.thymeleaf.org">

    <div class="container mx-auto px-6">
        <div class="flex justify-between items-center h-16">

            <!-- Logo -->
            <a href="/"
               class="text-zinc-900 dark:text-white font-semibold text-sm tracking-tight
                      hover:text-zinc-500 dark:hover:text-zinc-300
                      transition-colors duration-200 flex items-center gap-2">
                <div class="w-2 h-2 bg-zinc-900 dark:bg-white rounded-full"></div>
                TubeMetrics SEO Engine
            </a>

            <div class="flex items-center space-x-2">

                <!-- SEO Tags -->
                <a href="/"
                   class="text-zinc-500 hover:text-zinc-900 dark:hover:text-white
                          text-[14px] font-medium transition-all duration-200
                          py-1.5 px-3 rounded-md"
                   th:classappend="${activePage} == 'seo'
                       ? 'text-zinc-900 dark:text-white bg-zinc-100 dark:bg-white/5 border border-zinc-200 dark:border-white/10'
                       : ''">
                    SEO Tags
                </a>

                <!-- Thumbnails -->
                <a href="/thumbnail"
                   class="text-zinc-500 hover:text-zinc-900 dark:hover:text-white
                          text-[14px] font-medium transition-all duration-200
                          py-1.5 px-3 rounded-md"
                   th:classappend="${activePage} == 'thumbnails'
                       ? 'text-zinc-900 dark:text-white bg-zinc-100 dark:bg-white/5 border border-zinc-200 dark:border-white/10'
                       : ''">
                    Thumbnails
                </a>

                <!-- Video Data -->
                <a href="/video-details"
                   class="text-zinc-500 hover:text-zinc-900 dark:hover:text-white
                          text-[14px] font-medium transition-all duration-200
                          py-1.5 px-3 rounded-md"
                   th:classappend="${activePage} == 'video'
                       ? 'text-zinc-900 dark:text-white bg-zinc-100 dark:bg-white/5 border border-zinc-200 dark:border-white/10'
                       : ''">
                    Video Data
                </a>

                <!-- Divider -->
                <div class="h-4 w-[1px] bg-zinc-200 dark:bg-white/10 mx-2"></div>

                <!-- Theme Toggle Button -->
                <button id="themeToggle"
                        type="button"
                        class="w-8 h-8 flex items-center justify-center rounded-lg transition-all duration-200
                               text-zinc-500 hover:text-zinc-900 dark:hover:text-white
                               hover:bg-zinc-100 dark:hover:bg-white/5">
                    <i id="themeIcon" class="bi bi-sun"></i>
                </button>

            </div>
        </div>
    </div>

    <script>
        (function () {
            const toggleBtn = document.getElementById('themeToggle');
            const icon = document.getElementById('themeIcon');
            const htmlTag = document.documentElement;

            // ✅ Sync icon to match current theme on every page load
            function updateIcon() {
                if (htmlTag.classList.contains('dark')) {
                    icon.className = 'bi bi-moon-stars';
                } else {
                    icon.className = 'bi bi-sun';
                }
            }

            // Run on load
            updateIcon();

            // ✅ Toggle theme and persist to localStorage
            toggleBtn.addEventListener('click', function () {
                if (htmlTag.classList.contains('dark')) {
                    htmlTag.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                } else {
                    htmlTag.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                }
                updateIcon();
            });
        })();
    </script>
</nav>
