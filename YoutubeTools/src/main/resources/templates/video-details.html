<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Insights | Dark Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- ✅ Restore theme BEFORE page renders -->
    <script>
        if (localStorage.getItem('theme') === 'dark' ||
            (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                    // ✅ Removed hardcoded brandBg/brandCard/brandBorder
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }

        /* Dark mode gradient */
        .main-title {
            background: linear-gradient(to right, #fff, #71717a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* ✅ Light mode title override */
        html:not(.dark) .main-title {
            background: linear-gradient(to right, #111, #52525b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .custom-input {
            transition: all 0.2s ease;
        }
        .custom-input:focus {
            outline: none;
        }

        /* ✅ Scrollbar adapts to theme */
        .desc-box {
            max-height: 200px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(0,0,0,0.15) transparent;
            font-size: 13px;
            line-height: 1.6;
        }
        .dark .desc-box {
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }
        .desc-box::-webkit-scrollbar { width: 4px; }
        .desc-box::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.15);
            border-radius: 10px;
        }
        .dark .desc-box::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
        }

        .tag {
            font-size: 11px;
            transition: all 0.2s;
        }
    </style>
</head>

<!-- ✅ Light: white bg | Dark: near-black bg -->
<body class="bg-white dark:bg-[#0a0a0a] text-zinc-700 dark:text-zinc-400 min-h-screen transition-colors duration-300
             selection:bg-zinc-200 dark:selection:bg-zinc-800 selection:text-black dark:selection:text-white">

<div th:replace="~{fragments/navbar :: navbar}" th:with="activePage='video'"></div>

<div class="container mx-auto px-6 max-w-4xl mt-16 pb-20">

    <!-- Header -->
    <div class="text-center mb-12">
        <h1 class="main-title text-3xl md:text-4xl font-semibold tracking-tight mb-3">Video Data Retriever</h1>
        <p class="text-zinc-500 text-sm max-w-md mx-auto leading-relaxed">
            Deep-dive into video metadata, descriptions, and publishing details.
        </p>
    </div>

    <!-- Form Card -->
    <div class="bg-zinc-50 dark:bg-[#111111] border border-zinc-200 dark:border-white/10
                rounded-2xl p-6 mb-12 shadow-sm dark:shadow-2xl max-w-2xl mx-auto transition-colors duration-300">
        <form th:action="@{/youtube/video-details}" method="post" class="space-y-4">
            <div>
                <label for="videoUrlOrId"
                       class="block text-[11px] uppercase tracking-widest font-semibold text-zinc-400 dark:text-zinc-600 mb-3">
                    YouTube URL or ID
                </label>
                <input type="text" id="videoUrlOrId" name="videoUrlOrId"
                       class="custom-input w-full px-4 py-3 rounded-xl text-sm
                              bg-white dark:bg-[#161616]
                              border border-zinc-200 dark:border-white/10
                              focus:border-zinc-400 dark:focus:border-white/30
                              focus:bg-white dark:focus:bg-[#1a1a1a]
                              text-zinc-800 dark:text-zinc-200
                              placeholder:text-zinc-400 dark:placeholder:text-zinc-700
                              transition-colors duration-200"
                       required th:value="${videoUrlOrId}"
                       placeholder="https://youtube.com/...">
            </div>
            <button type="submit"
                    class="w-full bg-zinc-900 hover:bg-zinc-700 dark:bg-white dark:hover:bg-zinc-200
                           text-white dark:text-black
                           text-sm font-semibold py-3 px-6 rounded-xl transition-all duration-200">
                Extract Metadata
            </button>
        </form>

        <!-- Error -->
        <div th:if="${error}"
             class="mt-4 p-3 bg-red-50 dark:bg-red-500/10
                    border border-red-200 dark:border-red-500/20
                    text-red-500 dark:text-red-400
                    text-xs rounded-lg"
             th:text="${error}"></div>
    </div>

    <!-- Results Card -->
    <div th:if="${videoDetails != null}" class="animate-in fade-in slide-in-from-bottom-6 duration-700">
        <div class="bg-zinc-50 dark:bg-[#111111] border border-zinc-200 dark:border-white/10
                    rounded-3xl overflow-hidden shadow-sm dark:shadow-2xl transition-colors duration-300">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-0">

                <!-- Left: Thumbnail Panel -->
                <div class="lg:col-span-5 p-8
                            bg-zinc-100 dark:bg-black/20
                            border-b lg:border-b-0 lg:border-r
                            border-zinc-200 dark:border-white/8
                            transition-colors duration-300">
                    <div class="rounded-xl overflow-hidden border border-zinc-200 dark:border-white/5 shadow-lg mb-6">
                        <img th:src="${videoDetails.thumbnailUrl}"
                             th:alt="${videoDetails.title}"
                             class="w-full h-auto">
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-[10px] text-zinc-400 dark:text-zinc-600 uppercase tracking-widest font-bold">
                            Preview Asset
                        </span>
                        <a class="text-[11px]
                                  text-zinc-700 dark:text-zinc-300
                                  bg-zinc-200 dark:bg-white/5
                                  hover:bg-zinc-300 dark:hover:bg-white/10
                                  border border-zinc-300 dark:border-white/10
                                  py-2 px-4 rounded-lg transition-all"
                           th:href="${videoDetails.thumbnailUrl}" download>
                            <i class="bi bi-download mr-1"></i> Download
                        </a>
                    </div>
                </div>

                <!-- Right: Metadata Panel -->
                <div class="lg:col-span-7 p-8">

                    <!-- Title & Channel -->
                    <div class="mb-8">
                        <h2 class="text-zinc-900 dark:text-white text-lg font-medium leading-tight mb-2"
                            th:text="${videoDetails.title}"></h2>
                        <div class="flex items-center gap-3 text-[12px] text-zinc-500">
                            <span class="flex items-center gap-1">
                                <i class="bi bi-person-circle"></i>
                                <span th:text="${videoDetails.channelTitle}"></span>
                            </span>
                            <span class="text-zinc-300 dark:text-zinc-800">|</span>
                            <span class="flex items-center gap-1">
                                <i class="bi bi-calendar4-event"></i>
                                <span th:text="${videoDetails.publishedAt}"></span>
                            </span>
                        </div>
                    </div>

                    <!-- Description -->
                    <div class="mb-8">
                        <h3 class="text-[11px] uppercase tracking-widest font-bold text-zinc-400 dark:text-zinc-600 mb-3">
                            Description
                        </h3>
                        <div class="desc-box pr-2 text-zinc-600 dark:text-zinc-400"
                             th:text="${videoDetails.description != null ? videoDetails.description : 'No description provided.'}">
                        </div>
                    </div>

                    <!-- Tags -->
                    <div>
                        <h3 class="text-[11px] uppercase tracking-widest font-bold text-zinc-400 dark:text-zinc-600 mb-3">
                            Embedded Tags
                        </h3>
                        <div th:if="${not #lists.isEmpty(videoDetails.tags)}" class="flex flex-wrap gap-2">
                            <span th:each="tag : ${videoDetails.tags}"
                                  class="tag px-2.5 py-1.5 rounded-md
                                         bg-zinc-100 dark:bg-white/5
                                         border border-zinc-200 dark:border-white/8
                                         text-zinc-700 dark:text-zinc-300
                                         hover:bg-zinc-200 dark:hover:bg-white/10">
                                <span th:text="${tag}"></span>
                            </span>
                        </div>
                        <div th:if="${#lists.isEmpty(videoDetails.tags)}"
                             class="text-zinc-400 dark:text-zinc-700 text-[12px] italic">
                            No tags discovered for this video.
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
