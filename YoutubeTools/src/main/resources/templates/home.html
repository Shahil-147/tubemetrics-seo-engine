<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube SEO | AI Dark Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- ✅ Restore theme BEFORE page renders (prevents white flash) -->
    <script>
        if (localStorage.getItem('theme') === 'dark' ||
            (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }

        .main-title {
            background: linear-gradient(to right, #fff, #a1a1aa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Light mode title override */
        html:not(.dark) .main-title {
            background: linear-gradient(to right, #111, #52525b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .custom-input {
            transition: border-color 0.2s ease;
        }
        .custom-input:focus {
            outline: none;
        }

        .status-msg {
            backdrop-filter: blur(8px);
            font-size: 0.875rem;
        }

        .tag {
            transition: all 0.2s ease;
            font-size: 0.75rem;
        }
    </style>
</head>

<!-- ✅ Light: white bg, dark text | Dark: near-black bg, zinc text -->
<body class="bg-white dark:bg-[#0a0a0a] text-zinc-700 dark:text-zinc-400 min-h-screen transition-colors duration-300 selection:bg-zinc-200 dark:selection:bg-zinc-800 selection:text-black dark:selection:text-white">

<div th:replace="~{fragments/navbar :: navbar}" th:with="activePage='seo'"></div>

<div class="container mx-auto px-6 max-w-2xl mt-16 pb-20">

    <!-- Header -->
    <div class="text-center mb-12">
        <h1 class="main-title text-3xl md:text-4xl font-semibold tracking-tight mb-3">YouTube SEO Tags</h1>
        <p class="text-zinc-500 dark:text-zinc-500 text-sm max-w-md mx-auto leading-relaxed">
            Optimize your reach by extracting high-performing metadata from top-ranking content.
        </p>
    </div>

    <!-- Form Card -->
    <div class="bg-zinc-50 dark:bg-[#111111] border border-zinc-200 dark:border-white/10 rounded-2xl p-6 mb-10 shadow-sm dark:shadow-2xl transition-colors duration-300">
        <form action="/youtube/search" method="post" class="space-y-5">
            <div>
                <label for="videoTitle" class="block text-[11px] uppercase tracking-widest font-semibold text-zinc-400 dark:text-zinc-500 mb-3">
                    Target Video Title
                </label>
                <input type="text" id="videoTitle" name="videoTitle"
                       class="custom-input w-full px-4 py-3 rounded-xl text-sm
                              bg-white dark:bg-[#161616]
                              border border-zinc-200 dark:border-white/10
                              focus:border-zinc-400 dark:focus:border-white/30
                              text-zinc-800 dark:text-zinc-200
                              placeholder:text-zinc-400 dark:placeholder:text-zinc-600
                              transition-colors duration-200"
                       placeholder="e.g. How to learn Java in 2026" required>
            </div>
            <button type="submit"
                    class="w-full bg-zinc-900 hover:bg-zinc-700 dark:bg-white dark:hover:bg-zinc-200
                           text-white dark:text-black
                           text-sm font-semibold py-3 px-6 rounded-xl
                           transition-all duration-200 flex items-center justify-center gap-2">
                Generate SEO Tags
            </button>
        </form>
    </div>

    <!-- Error -->
    <div th:if="${error}"
         class="status-msg bg-red-50 dark:bg-red-500/10 text-red-500 dark:text-red-400 rounded-xl p-4 mb-6 border border-red-200 dark:border-red-500/20"
         th:text="${error}"></div>

    <!-- Primary Video Result -->
    <div th:if="${primaryVideo != null}" class="animate-in fade-in duration-500">
        <div class="bg-zinc-50 dark:bg-[#111111] border border-zinc-200 dark:border-white/10 rounded-2xl p-6 mb-8 shadow-sm transition-colors duration-300">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2">
                    <div class="h-2 w-2 rounded-full bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.5)]"></div>
                    <span class="text-xs font-semibold text-zinc-800 dark:text-white uppercase tracking-wider">Top Match</span>
                </div>
                <button type="button"
                        class="text-[11px] text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-white
                               border border-zinc-200 dark:border-white/10
                               px-3 py-1.5 rounded-lg transition-all"
                        th:onclick="'copyTags(\\'' + ${primaryVideo.tagsAsString} + '\\')'">
                    <i class="bi bi-copy mr-1"></i> Copy
                </button>
            </div>

            <div class="mb-4">
                <h3 class="text-zinc-800 dark:text-white text-sm font-medium mb-1" th:text="${primaryVideo.title}"></h3>
                <p class="text-zinc-500 dark:text-zinc-500 text-[12px]" th:text="${primaryVideo.channelTitle}"></p>
            </div>

            <div class="flex flex-wrap gap-2">
                <span th:each="tag : ${primaryVideo.tags}"
                      class="tag inline-flex items-center px-3 py-1.5 rounded-lg
                             bg-zinc-100 dark:bg-white/5
                             border border-zinc-200 dark:border-white/8
                             text-zinc-600 dark:text-zinc-400
                             hover:bg-zinc-200 dark:hover:bg-white/10
                             hover:text-zinc-900 dark:hover:text-white
                             hover:border-zinc-300 dark:hover:border-white/20">
                    <span th:text="${tag}"></span>
                </span>
            </div>
        </div>
    </div>

    <!-- Related Videos -->
    <div th:if="${relatedVideos != null}">
        <div class="flex items-center justify-between mb-4 px-2">
            <h2 class="text-xs font-semibold text-zinc-400 dark:text-zinc-500 uppercase tracking-widest">Related Ideas</h2>
            <button class="text-[11px] text-blue-500 dark:text-blue-400 hover:underline"
                    th:onclick="'copyTags(\\'' + ${allTagsAsString} + '\\')'">Copy All Tags</button>
        </div>

        <div class="space-y-4">
            <div th:each="video : ${relatedVideos}"
                 class="bg-zinc-50/50 dark:bg-[#111111]/50 border border-zinc-200 dark:border-white/10 rounded-xl p-5 transition-colors duration-300">
                <div class="text-[13px] text-zinc-700 dark:text-zinc-300 font-medium mb-3 flex items-start gap-2">
                    <i class="bi bi-play-circle text-zinc-400 dark:text-zinc-600 mt-0.5"></i>
                    <span th:text="${video.title}"></span>
                </div>
                <div class="flex flex-wrap gap-2">
                    <span th:if="${#lists.isEmpty(video.tags)}"
                          class="text-zinc-400 dark:text-zinc-700 text-[11px] italic">No metadata found</span>
                    <span th:each="tag : ${video.tags}"
                          class="tag inline-flex items-center px-2 py-1 rounded-md
                                 bg-zinc-100 dark:bg-white/5
                                 border border-zinc-200 dark:border-white/8
                                 text-zinc-600 dark:text-zinc-400
                                 hover:bg-zinc-200 dark:hover:bg-white/10
                                 hover:text-zinc-900 dark:hover:text-white">
                        <span th:text="${tag}"></span>
                    </span>
                </div>
            </div>
        </div>
    </div>

    <!-- Copy Success Toast -->
    <div id="copySuccess"
         class="fixed bottom-8 left-1/2 -translate-x-1/2 status-msg
                bg-zinc-900 dark:bg-zinc-900 text-white
                hidden px-6 py-3 rounded-full shadow-2xl z-50
                border border-white/10">
        <i class="bi bi-check2-circle text-green-400 mr-2"></i> Copied to clipboard
    </div>
</div>

<script>
    function copyTags(tags) {
        navigator.clipboard.writeText(tags).then(() => {
            const success = document.getElementById('copySuccess');
            success.classList.remove('hidden');
            setTimeout(() => success.classList.add('hidden'), 2500);
        });
    }
</script>
</body>
</html>
